name: Daily Paper Update

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00) 运行
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pypdf requests

      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN is not set"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "❌ TELEGRAM_CHAT_ID is not set"
            exit 1
          fi
          echo "✅ Secrets are configured"

      - name: Run daily paper update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 paper_agent.py update \
            --root . \
            --config config.json \
            --notify 2>&1 | tee /tmp/paper_agent.log
          echo "--- Paper agent output ---"
          grep -E "(Notify|WARN|New papers|Telegram|Error)" /tmp/paper_agent.log || true

      - name: Commit and push changes
        run: |
          git config user.name "Paper Agent Bot"
          git config user.email "paper-agent[bot]@users.noreply.github.com"

          # Stage only data/ and reports/ (our output directories)
          git add -A data/ reports/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          DATE=$(date -u +"%Y-%m-%d")
          PAPER_COUNT=$(git diff --cached --name-only | grep -c "notes/" || echo "0")
          git commit -m "📄 Daily paper update ${DATE} (+${PAPER_COUNT} papers)"

          # Rebase our new commit onto the latest remote main
          # This handles any commits pushed between checkout and now
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || {
              echo "⚠️ Rebase conflict on attempt $i, aborting and retrying..."
              git rebase --abort || true
              sleep 2
              continue
            }
            if git push origin main; then
              echo "✅ Push succeeded on attempt $i"
              exit 0
            fi
            echo "⚠️ Push failed (attempt $i/3), retrying..."
            sleep 2
          done
          echo "❌ Push failed after 3 attempts"
          exit 1
